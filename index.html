<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILLY STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAz4R3bBfz9XseM2tAv3koBH12XmsNvhRE",
            authDomain: "milly-store.firebaseapp.com",
            projectId: "milly-store",
            storageBucket: "milly-store.firebasestorage.app",
            messagingSenderId: "693622566931",
            appId: "1:693622566931:web:ef0fda149cd4a45dff8fe6",
            measurementId: "G-1WZM9J7B5T"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);

        // Expose to window for the global functions
        window.db = db;
        window.collection = collection;
        window.onSnapshot = onSnapshot;
    </script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-white text-stone-900 dark:bg-stone-950 dark:text-stone-100 min-h-screen transition-colors duration-300">

    <div class="bg-[#00966b] text-white text-center py-2 text-[10px] sm:text-xs font-semibold uppercase tracking-widest">
        Free Delivery on Orders Over ₦25,000
    </div>

    <nav class="sticky top-0 z-40 bg-[#0f172a] border-b border-stone-800">
        <div class="max-w-7xl mx-auto px-3 sm:px-4 h-16 sm:h-20 flex items-center justify-between gap-3 sm:gap-4">
            <a href="#" class="text-lg sm:text-2xl font-black text-white shrink-0">MILLY<span class="text-[#00966b]">STORE</span></a>
            <input type="text" id="search-input" onkeyup="filterProducts()" placeholder="Search products..." class="w-full max-w-[200px] sm:max-w-md bg-stone-800 text-white rounded-lg sm:rounded-xl px-3 sm:px-4 py-1.5 sm:py-2 text-xs sm:text-sm outline-none focus:ring-2 focus:ring-[#00966b]">
            <div class="flex items-center gap-2 sm:gap-4 shrink-0">
                <button onclick="toggleTheme()" class="p-2 text-stone-300 hover:text-white">
                    <svg class="w-5 h-5 theme-sun-icon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                    <svg class="w-5 h-5 theme-moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                </button>
                <button onclick="toggleCart()" class="relative p-2 text-stone-300 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                    <span id="cart-count" class="absolute top-0 right-0 bg-[#00966b] text-white text-[10px] font-bold px-1.5 rounded-full">0</span>
                </button>
            </div>
        </div>
    </nav>

    <header class="relative min-h-[400px] md:min-h-[600px] flex items-center overflow-hidden">
        <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?auto=format&fit=crop&q=80&w=2000" class="absolute inset-0 w-full h-full object-cover" alt="Shopping">
        <div class="absolute inset-0 bg-black/50"></div>
        <div class="relative max-w-7xl mx-auto px-4 w-full text-white">
            <h1 class="text-4xl md:text-7xl font-extrabold mb-6 leading-tight">CURATED.<br>PREMIUM.<br>DELIVERED.</h1>
            <p class="text-lg md:text-xl mb-8 max-w-lg text-stone-200">Discover essential goods selected with care. Delivered straight to your door across Nigeria.</p>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-4 py-16">
        <h2 class="text-3xl font-bold mb-8">Store Inventory</h2>
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </section>

    <div id="cart-drawer" class="fixed inset-0 z-[100] hidden">
        <div onclick="toggleCart()" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>
        <div id="cart-panel" class="absolute right-0 top-0 h-full w-full max-w-sm bg-white dark:bg-stone-950 shadow-2xl p-6 transition-transform duration-300 translate-x-full flex flex-col">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-bold">Your Cart</h2>
                <button onclick="toggleCart()" class="text-2xl font-bold">&times;</button>
            </div>
            <div id="cart-items" class="space-y-4 flex-1 overflow-y-auto"></div>
            <div id="cart-footer" class="mt-8 border-t dark:border-stone-800 pt-4 hidden">
                <div class="flex justify-between font-bold text-lg mb-4"><span>Total:</span> <span id="cart-total">₦0</span></div>
                <button onclick="handleCheckout()" class="w-full bg-[#00966b] text-white py-4 rounded-xl font-bold hover:bg-[#00825a] transition-all">CHECKOUT</button>
            </div>
        </div>
    </div>

    <script>
        let allProducts = [];
        let cart = JSON.parse(localStorage.getItem('millyCart') || '[]');

        // Firebase Live Sync
        setTimeout(() => {
            onSnapshot(collection(window.db, "products"), (snapshot) => {
                allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderGrid(allProducts);
            });
        }, 1000);

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            document.querySelectorAll('.theme-sun-icon, .theme-moon-icon').forEach(icon => icon.classList.toggle('hidden'));
        }

        function toggleCart() {
            const drawer = document.getElementById('cart-drawer');
            const panel = document.getElementById('cart-panel');
            drawer.classList.toggle('hidden');
            setTimeout(() => panel.classList.toggle('translate-x-full'), 10);
        }

        function filterProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query));
            renderGrid(filtered);
        }

        function renderGrid(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map((p, i) => `
                <div class="border dark:border-stone-800 p-4 rounded-2xl flex flex-col h-full bg-white dark:bg-stone-900 shadow-sm">
                    <img src="${p.image}" class="w-full h-80 md:h-96 object-cover rounded-xl mb-4">
                    <h3 class="font-bold text-xl">${p.name}</h3>
                    <p class="text-xs text-stone-500 mb-2">Stock: ${p.stock}</p>
                    <p class="text-[#00966b] font-bold text-2xl mt-auto">₦${p.price}</p>
                    <button onclick="addToCart(${i})" class="w-full mt-4 bg-[#00966b] text-white py-4 rounded-lg font-bold hover:bg-[#00825a] transition-all">ADD TO CART</button>
                </div>
            `).join('');
        }

        function addToCart(index) {
            cart.push({...allProducts[index], qty: 1});
            localStorage.setItem('millyCart', JSON.stringify(cart));
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-items');
            const footer = document.getElementById('cart-footer');
            const count = document.getElementById('cart-count');
            count.innerText = cart.length;
            
            if (cart.length === 0) {
                list.innerHTML = `<div class="text-center text-stone-400 mt-20">Your cart is empty</div>`;
                footer.classList.add('hidden');
            } else {
                footer.classList.remove('hidden');
                list.innerHTML = cart.map((item, i) => `
                    <div class="flex items-center gap-4 border-b dark:border-stone-800 pb-4">
                        <img src="${item.image}" class="w-16 h-16 object-cover rounded-lg">
                        <div class="flex-1 text-sm font-bold">
                            <h4>${item.name}</h4>
                            <div class="flex items-center gap-2 mt-1">
                                <button onclick="updateQty(${i}, -1)" class="px-2 bg-stone-200 dark:bg-stone-700 rounded">-</button>
                                <span>${item.qty}</span>
                                <button onclick="updateQty(${i}, 1)" class="px-2 bg-stone-200 dark:bg-stone-700 rounded">+</button>
                            </div>
                        </div>
                        <button onclick="removeFromCart(${i})" class="text-red-500 font-bold">X</button>
                    </div>
                `).join('');
                const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
                document.getElementById('cart-total').innerText = '₦' + total.toLocaleString();
            }
        }

        function updateQty(i, d) {
            cart[i].qty = Math.max(1, cart[i].qty + d);
            renderCart();
        }

        function removeFromCart(i) {
            cart.splice(i, 1);
            localStorage.setItem('millyCart', JSON.stringify(cart));
            renderCart();
        }

        function handleCheckout() {
            alert("Proceeding to checkout for total: " + document.getElementById('cart-total').innerText);
        }

        renderCart();
    </script>
</body>
</html>
